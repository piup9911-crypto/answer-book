<!doctype html>
<html lang="zh-CN" data-theme="forest">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" id="themeColor" content="#04110d" />
    <meta
      name="description"
      content="阿祈的答案之书——触碰开启，或滑动书页，在停下的地方遇见答案。"
    />
    <title>阿祈的答案之书</title>
    <link rel="stylesheet" href="/styles.css?v=34" />
    <script type="module" src="/app.js?v=34"></script>
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <img class="forest-backdrop" src="/assets/forest-backdrop.webp" alt="" />
      <div class="fireflies">
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
        <img class="firefly" src="/assets/firefly-glow.webp" alt="" />
      </div>
      <span class="glow glow-one"></span>
      <span class="glow glow-two"></span>
      <span class="grain"></span>
    </div>

    <main class="app">
      <header class="masthead">
        <p class="eyebrow">A BOOK FOR YOUR QUESTION</p>
        <div class="masthead-actions">
          <span class="guide-entry">
            <button
              class="guide-button"
              id="guideButton"
              type="button"
              aria-label="打开操作指南"
            >
              <span class="control-icon control-icon-guide" aria-hidden="true"></span>
              <span>指南</span>
            </button>
            <button
              class="guide-replay-hint"
              id="guideReplayHint"
              type="button"
              hidden
            >
              <span class="guide-replay-arrow" aria-hidden="true"></span>
              <span>以后可以从这里再次打开指南</span>
            </button>
          </span>
          <button
            class="theme-button"
            id="themeButton"
            type="button"
            aria-pressed="true"
            aria-label="切换至原典主题"
          >
            <span class="control-icon control-icon-theme" aria-hidden="true"></span>
            <span class="theme-label" id="themeLabel">森境</span>
          </button>
          <button
            class="sound-button"
            id="soundButton"
            type="button"
            aria-pressed="true"
            aria-label="关闭声音"
          >
            <span class="control-icon control-icon-sound" aria-hidden="true"></span>
            <span id="soundLabel">声音开</span>
          </button>
        </div>
      </header>

      <section class="book-scene" id="bookScene" aria-live="polite">
        <div class="book-shadow" aria-hidden="true"></div>

        <div class="book-stage">
          <div class="book" id="book" data-state="closed">
          <div class="open-book" id="openBook">
            <div class="page-stack page-stack-left" id="leftPageStack" aria-hidden="true"></div>
            <div class="page-stack page-stack-right" id="rightPageStack" aria-hidden="true"></div>
            <div class="book-spine" aria-hidden="true"></div>

            <div class="paper left-paper">
              <div class="paper-noise"></div>
              <div class="left-content">
                <span class="small-star">✦</span>
                <p class="question-label">把问题留在心里</p>
                <p class="question-copy" id="questionCopy">然后相信你翻到的这一页</p>
                <span class="ornament">— ◆ —</span>
              </div>
              <span class="paper-page">AQI</span>
            </div>

            <div class="paper right-paper" id="turnSurface">
              <div class="paper-noise"></div>
              <div class="answer-content" id="answerContent">
                <p class="answer-text" id="answerText"></p>
                <span class="answer-rule"></span>
                <p class="answer-number" id="answerNumber"></p>
              </div>
              <span class="paper-page" id="pageNumber"></span>

            </div>

            <div class="turning-sheet" id="turningSheet" aria-hidden="true">
              <div class="sheet-face sheet-front">
                <div class="paper-noise"></div>
                <div class="sheet-answer" id="sheetFrontAnswer">
                  <p class="answer-text" id="sheetFrontText"></p>
                  <span class="answer-rule"></span>
                  <p class="answer-number" id="sheetFrontNumber"></p>
                </div>
                <div class="sheet-whisper" id="sheetFrontWhisper">
                  <span class="small-star">✦</span>
                  <span>让这一页慢慢落下</span>
                </div>
                <span class="paper-page" id="sheetFrontPage"></span>
              </div>
              <div class="sheet-face sheet-back">
                <div class="paper-noise"></div>
                <div class="sheet-answer" id="sheetBackAnswer">
                  <p class="answer-text" id="sheetBackText"></p>
                  <span class="answer-rule"></span>
                  <p class="answer-number" id="sheetBackNumber"></p>
                </div>
                <div class="sheet-whisper" id="sheetBackWhisper">
                  <span class="small-star">✦</span>
                  <span>答案就在下一页</span>
                </div>
                <span class="paper-page" id="sheetBackPage"></span>
              </div>
              <span class="page-curl-light" aria-hidden="true"></span>
            </div>

            <div class="thick-page-block" id="thickPageBlock" aria-hidden="true">
              <div class="block-lag-pages" aria-hidden="true">
                <span class="block-lag-page"></span>
                <span class="block-lag-page"></span>
                <span class="block-lag-page"></span>
              </div>
              <div class="thick-block-face thick-block-front">
                <div class="paper-noise"></div>
                <span class="thick-block-mark">✦</span>
              </div>
              <div class="thick-block-face thick-block-back">
                <div class="paper-noise"></div>
              </div>
              <div class="thick-block-edge" aria-hidden="true"></div>
              <div class="thick-block-bottom" aria-hidden="true"></div>
              <div class="block-bend-surface" aria-hidden="true">
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
                <span class="block-bend-slice"></span>
              </div>
            </div>

            <div class="closed-book" id="closedBook">
              <div class="page-block" aria-hidden="true"></div>
              <div class="cover-leaf">
                <button
                  class="front-cover"
                  id="coverButton"
                  type="button"
                  aria-label="轻触随机打开，或向左滑动从第零页打开"
                >
                  <span class="cover-border cover-border-outer"></span>
                  <span class="cover-border cover-border-inner"></span>
                  <span class="corner corner-tl"></span>
                  <span class="corner corner-tr"></span>
                  <span class="corner corner-bl"></span>
                  <span class="corner corner-br"></span>
                  <span class="cover-star" aria-hidden="true">✦</span>
                  <span class="cover-kicker">THE BOOK OF</span>
                  <span class="cover-title">答案之书</span>
                  <span class="cover-rule"></span>
                </button>
                <div class="cover-inside" aria-hidden="true">
                  <div class="paper-noise"></div>
                  <span class="inside-mark">AQI</span>
                </div>
              </div>
            </div>
          </div>
          </div>

          <div class="entry-mode-hint browse-mode-hint" id="browseModeHint" role="status" hidden>
            <span class="browse-mode-hint-icon" aria-hidden="true"></span>
            <span>还可以向左滑动封面，从第 000 页开始翻阅</span>
          </div>
          <div class="entry-mode-hint random-mode-hint" id="randomModeHint" role="status" hidden>
            <span class="random-mode-hint-icon" aria-hidden="true"></span>
            <span>也可以轻触封面，随机打开一个答案</span>
          </div>

          <div class="page-navigator" id="pageNavigator" aria-hidden="true" inert>
            <div
              class="page-track"
              id="pageTrack"
              role="slider"
              tabindex="0"
              aria-label="选择答案页"
              aria-valuemin="0"
              aria-valuemax="412"
              aria-valuenow="1"
            >
              <span class="page-track-line"></span>
              <span class="page-track-fill" id="pageTrackFill"></span>
              <span class="page-track-thumb" id="pageTrackThumb"></span>
            </div>
            <div class="page-track-meta" aria-hidden="true">
              <span>000</span>
              <span class="page-track-instruction" id="pageTrackInstruction">打开书后可滑动或轻点</span>
              <span>412</span>
            </div>
          </div>
        </div>

      </section>

      <footer class="controls">
        <p class="status" id="statusText">轻触随机开启 · 向左滑动从 000 开始</p>
        <div class="open-actions" id="openActions" hidden>
          <button class="text-button" id="againButton" type="button">再问一次</button>
          <span class="action-separator" aria-hidden="true"></span>
          <button class="text-button" id="closeButton" type="button">合上书</button>
        </div>
      </footer>
    </main>

    <div class="loading-screen" id="loadingScreen">
      <span class="loading-star">✦</span>
      <p>正在整理书页</p>
    </div>

    <div class="guide-layer" id="guideLayer" hidden>
      <div class="guide-focus" id="guideFocus" aria-hidden="true"></div>
      <section
        class="guide-card"
        id="guideCard"
        role="dialog"
        aria-modal="false"
        aria-labelledby="guideTitle"
        aria-describedby="guideCopy"
      >
        <p class="guide-step" id="guideStep">01 / 03</p>
        <h2 class="guide-title" id="guideTitle"></h2>
        <p class="guide-copy" id="guideCopy"></p>
        <div class="guide-visual" aria-hidden="true">
          <span class="guide-cue guide-cue-primary" id="guideCuePrimary">
            <span class="guide-cue-icon" id="guideCuePrimaryIcon"></span>
            <span class="guide-cue-label" id="guideCuePrimaryLabel"></span>
          </span>
          <span class="guide-cue-separator"></span>
          <span class="guide-cue guide-cue-secondary" id="guideCueSecondary">
            <span class="guide-cue-icon" id="guideCueSecondaryIcon"></span>
            <span class="guide-cue-label" id="guideCueSecondaryLabel"></span>
          </span>
        </div>
        <div class="guide-actions">
          <button class="guide-skip" id="guideSkip" type="button">跳过</button>
          <button class="guide-continue" id="guideContinue" type="button" hidden>
            继续
          </button>
        </div>
      </section>
    </div>

    <div class="error-toast" id="errorToast" role="alert" hidden></div>
  </body>
</html>
